# LABRAM Unified Training Configuration
# This configuration demonstrates multitask training with LABRAM model

# Basic configuration
seed: 42
master_port: 51301
multitask: true
model_type: 'labram'

# Data configuration
data:
  batch_size: 32
  num_workers: 1
  datasets:
    tuab: 'finetune'
    seed: 'finetune_sub_dependent'
    hmc: 'finetune'
    # ...

# Model configuration
model:
  pretrained_path: null

  model_name: "labram_base_patch200_200"
  
  # Input configuration
  eeg_size: 2000
  patch_size: 200
  in_chans: 1
  out_chans: 8
  
  # Architecture parameters
  embed_dim: 200
  depth: 12
  num_heads: 10
  mlp_ratio: 4.0
  
  # Regularization
  dropout_rate: 0.1
  attn_dropout_rate: 0.1
  drop_path_rate: 0.1
  
  # Model initialization
  init_values: 0.1
  init_scale: 0.001
  layer_scale_init_value: 0.1
  qkv_bias: false
  
  # Position embeddings
  use_abs_pos_emb: true
  use_rel_pos_bias: false
  use_shared_rel_pos_bias: false
  use_mean_pooling: true
  
  # Classifier head configuration
  classifier_head:
    head_type: 'avg_pool'  # Options: avg_pool, attention_pool, flatten_mlp, dual_stream_fusion
    
    # Common parameters
    hidden_dims: [128]
    dropout: 0.3
    
    # Attention Pool parameters (for attention_pool)
    attn_n_head: 4
    attn_head_dim: 50
    
    # Dual Stream Fusion parameters (for dual_stream_fusion)
    fusion_mode: 'dual'  # Options: time_first, channel_first, dual
    fusion_n_head: 4
    fusion_head_dim: 50
    fusion_use_rope: true
    fusion_rope_theta: 10000.0
    fusion_max_seq_len: 1024

# Training configuration
training:
  max_epochs: 20
  weight_decay: 0.05
  max_grad_norm: 1.0

  lr_schedule: "cosine"
  max_lr: 8e-4
  encoder_lr_scale: 0.5
  warmup_epochs: 2
  warmup_scale: 1e-1
  pct_start: 0.2          # For OneCycleLR
  min_lr: 8e-5
  
  # Layer-wise decay
  layer_decay: 0.9
  
  # Training options
  use_amp: true
  freeze_encoder: false

  label_smoothing: 0.1
  
  # Model EMA
  model_ema: false
  model_ema_decay: 0.9999
  model_ema_force_cpu: false

  # LoRA configuration
  lora:
    use_lora: false
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.0
    lora_target_modules: ['default']
    lora_exclude_modules: null
    lora_target_type: 'default'  # Options: default, full, attention, ffn
    lora_scope: 'transformer'    # Options: transformer, full
    lora_lr_scale: 1.0

# Logging configuration
logging:
  experiment_name: "labram"
  run_dir: "assets/run"
  
  # Cloud logging
  use_cloud: true
  cloud_backend: "wandb"
  project: "labram"
  offline: false

  tags: 
    - "labram"
    - "uni"
    - "avg_pool"
    - "full"
  
  # Logging intervals
  log_step_interval: 1
  ckpt_interval: 20